<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NoName Factory</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f5f2ec;
      --ink: #0a0a0a;
      --ink-light: #3a3a3a;
      --ink-muted: #888;
      --accent: #c8102e;
      --border: #d0ccc4;
      --card: #ffffff;
      --success: #1a7a4a;
      --error: #c8102e;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: var(--bg);
      color: var(--ink);
      font-family: 'Roboto Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }
    header {
      position: relative; z-index: 1;
      display: flex; align-items: center; gap: 20px;
      padding: 32px 48px 24px;
      border-bottom: 1px solid var(--border);
      animation: fadeDown 0.6s ease both;
    }
    .logo { width: 52px; height: auto; flex-shrink: 0; filter: contrast(1.1); }
    .site-title {
      font-family: 'Century Gothic', 'CenturyGothic', 'AppleGothic', Futura, 'Trebuchet MS', sans-serif;
      font-weight: 700;
      font-size: clamp(1.6rem, 3vw, 2.4rem);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink);
      line-height: 1;
    }
    .site-tagline { font-size: 0.65rem; color: var(--ink-muted); letter-spacing: 0.2em; text-transform: uppercase; margin-top: 4px; }
    main {
      position: relative; z-index: 1;
      max-width: 760px; margin: 0 auto;
      padding: 72px 48px;
      display: flex; flex-direction: column; gap: 64px;
    }
    .section-label {
      font-size: 0.6rem; letter-spacing: 0.3em; text-transform: uppercase;
      color: var(--ink-muted); margin-bottom: 32px;
      display: flex; align-items: center; gap: 12px;
    }
    .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .panel {
      border: 1px solid var(--border); background: var(--card);
      padding: 40px; position: relative;
      animation: fadeUp 0.7s 0.1s ease both;
    }
    .panel[data-label]::before {
      content: attr(data-label);
      position: absolute; top: -8px; left: 24px;
      background: var(--card); padding: 0 8px;
      font-size: 0.55rem; letter-spacing: 0.3em; color: var(--ink-muted);
    }
    .db-status-row { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--ink-muted); flex-shrink: 0; transition: background 0.4s;
    }
    .status-dot.connected { background: var(--success); box-shadow: 0 0 6px var(--success); }
    .status-dot.error     { background: var(--error); }
    .status-text { font-size: 0.72rem; color: var(--ink-muted); letter-spacing: 0.1em; text-transform: uppercase; }
    .btn {
      display: inline-flex; align-items: center; gap: 10px;
      background: var(--ink); color: #f5f2ec; border: none;
      padding: 14px 28px;
      font-family: 'Roboto Mono', monospace; font-size: 0.72rem;
      letter-spacing: 0.18em; text-transform: uppercase;
      cursor: pointer; transition: background 0.2s, transform 0.15s;
    }
    .btn:hover    { background: #2a2a2a; transform: translateY(-1px); }
    .btn:active   { transform: translateY(0); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn.loading .btn-icon { animation: spin 0.8s linear infinite; }
    .result-box {
      margin-top: 28px; padding: 24px;
      border-left: 3px solid var(--ink-muted);
      background: #faf9f6; display: none;
      animation: fadeUp 0.4s ease both;
    }
    .result-box.visible     { display: block; }
    .result-box.success     { border-color: var(--success); }
    .result-box.error-state { border-color: var(--error); }
    .result-label { font-size: 0.55rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--ink-muted); margin-bottom: 14px; }
    .result-content { font-size: 0.75rem; line-height: 1.8; color: var(--ink); }
    .result-content .key { color: var(--ink-muted); display: inline-block; min-width: 140px; }
    .result-content .val     { color: var(--ink); }
    .result-content .val.ok  { color: var(--success); }
    .result-content .val.err { color: var(--error); }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    .field { display: flex; flex-direction: column; gap: 8px; }
    .field.full { grid-column: 1 / -1; }
    .field label { font-size: 0.58rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--ink-muted); }
    .field input, .field textarea {
      font-family: 'Roboto Mono', monospace; font-size: 0.78rem;
      color: var(--ink); background: #faf9f6;
      border: 1px solid var(--border); padding: 12px 14px;
      outline: none; transition: border-color 0.2s, background 0.2s; resize: none;
    }
    .field input:focus, .field textarea:focus { border-color: var(--ink); background: #fff; }
    .field input::placeholder, .field textarea::placeholder { color: #bbb; }
    .field textarea { min-height: 120px; }
    .form-footer { display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
    .char-count { font-size: 0.6rem; color: var(--ink-muted); letter-spacing: 0.1em; }
    footer {
      position: relative; z-index: 1;
      padding: 24px 48px; border-top: 1px solid var(--border);
      font-size: 0.6rem; color: var(--ink-muted);
      letter-spacing: 0.15em; text-transform: uppercase;
      display: flex; justify-content: space-between;
      animation: fadeUp 0.7s 0.2s ease both;
    }
    @keyframes fadeDown { from { opacity: 0; transform: translateY(-12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeUp   { from { opacity: 0; transform: translateY(12px);  } to { opacity: 1; transform: translateY(0); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width: 560px) {
      header, main, footer { padding-left: 24px; padding-right: 24px; }
      .form-grid { grid-template-columns: 1fr; }
      .panel { padding: 28px; }
    }
  </style>
</head>
<body>

  <header>
    <img src="/static/logo.png" alt="NoName Factory Logo" class="logo" />
    <div>
      <div class="site-title">NoName Factory</div>
      <div class="site-tagline">System Interface — v0.1.0</div>
    </div>
  </header>

  <main>

    <section>
      <div class="section-label">Infrastructure</div>
      <div class="panel" data-label="DATABASE">
        <div class="db-status-row">
          <span class="status-dot" id="statusDot"></span>
          <span class="status-text" id="statusText">Not connected</span>
        </div>
        <button class="btn" id="connectBtn" onclick="connectDB()">
          <span class="btn-icon">⬡</span>
          Connect DB
        </button>
        <div class="result-box" id="dbResultBox">
          <div class="result-label">Connection Report</div>
          <div class="result-content" id="dbResultContent"></div>
        </div>
      </div>
    </section>

    <section>
      <div class="section-label">Contact</div>
      <div class="panel" data-label="TRANSMISSION">
        <div class="form-grid">
          <div class="field">
            <label for="contactName">Name</label>
            <input type="text" id="contactName" placeholder="Your name" autocomplete="name" />
          </div>
          <div class="field">
            <label for="contactEmail">Email</label>
            <input type="email" id="contactEmail" placeholder="your@email.com" autocomplete="email" />
          </div>
          <div class="field full">
            <label for="contactComment">Message</label>
            <textarea id="contactComment" placeholder="Write your message here..." maxlength="1000" oninput="updateCharCount()"></textarea>
          </div>
        </div>
        <div class="form-footer">
          <span class="char-count" id="charCount">0 / 1000</span>
          <button class="btn" id="submitBtn" onclick="submitForm()">
            <span class="btn-icon">→</span>
            Send Transmission
          </button>
        </div>
        <div class="result-box" id="formResultBox">
          <div class="result-label">Transmission Report</div>
          <div class="result-content" id="formResultContent"></div>
        </div>
      </div>
    </section>

  </main>

  <footer>
    <span>NoName Factory</span>
    <span id="footerTs"></span>
  </footer>

  <script>
    document.getElementById('footerTs').textContent = new Date().toISOString().slice(0, 10);
    function updateCharCount() {
      const len = document.getElementById('contactComment').value.length;
      document.getElementById('charCount').textContent = len + ' / 1000';
    }
    async function connectDB() {
      const btn = document.getElementById('connectBtn');
      const dot = document.getElementById('statusDot');
      const statusText = document.getElementById('statusText');
      const resultBox = document.getElementById('dbResultBox');
      const resultContent = document.getElementById('dbResultContent');
      setLoading(btn, true, '⬡');
      statusText.textContent = 'Connecting...';
      dot.className = 'status-dot';
      resultBox.className = 'result-box';
      try {
        const data = await fetchJSON('/db-hello');
        if (data.error) {
          dot.className = 'status-dot error';
          statusText.textContent = 'Connection failed';
          showResult(resultBox, resultContent, 'error', [['status','✗ ERROR','err'],['message',data.error,'err']]);
        } else {
          const version   = data.postgres_version || '';
          const pgVersion = version.match(/PostgreSQL ([\d.]+)/)?.[1] || '—';
          const os        = version.match(/on ([^,]+)/)?.[1] || '—';
          const compiler  = version.match(/compiled by ([^,]+)/)?.[1] || '—';
          dot.className = 'status-dot connected';
          statusText.textContent = 'Connected';
          showResult(resultBox, resultContent, 'success', [
            ['status','✓ CONNECTED','ok'],
            ['engine','PostgreSQL ' + pgVersion],
            ['platform', os],
            ['compiler', compiler],
            ['timestamp', new Date().toISOString()],
          ]);
          btn.innerHTML = '<span class="btn-icon">✓</span> Connected';
          btn.disabled = true;
          return;
        }
      } catch (err) {
        dot.className = 'status-dot error';
        statusText.textContent = 'Request failed';
        showResult(resultBox, resultContent, 'error', [['status','✗ FETCH ERROR','err'],['message',err.message,'err']]);
      } finally {
        setLoading(btn, false, '⬡');
      }
    }
    async function submitForm() {
      const name    = document.getElementById('contactName').value.trim();
      const email   = document.getElementById('contactEmail').value.trim();
      const comment = document.getElementById('contactComment').value.trim();
      const btn     = document.getElementById('submitBtn');
      const resultBox     = document.getElementById('formResultBox');
      const resultContent = document.getElementById('formResultContent');
      if (!name || !email || !comment) {
        showResult(resultBox, resultContent, 'error', [['status','✗ VALIDATION ERROR','err'],['message','All fields are required.','err']]);
        return;
      }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        showResult(resultBox, resultContent, 'error', [['status','✗ VALIDATION ERROR','err'],['message','Invalid email address.','err']]);
        return;
      }
      setLoading(btn, true, '→');
      resultBox.className = 'result-box';
      try {
        const data = await fetchJSON('/contact', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, comment }),
        });
        if (data.error) {
          showResult(resultBox, resultContent, 'error', [['status','✗ ERROR','err'],['message',data.error,'err']]);
        } else {
          showResult(resultBox, resultContent, 'success', [
            ['status',    '✓ TRANSMITTED', 'ok'],
            ['email to',  data.email_sent_to],
            ['saved id',  '#' + data.submission_id],
            ['timestamp', data.timestamp],
          ]);
          document.getElementById('contactName').value    = '';
          document.getElementById('contactEmail').value   = '';
          document.getElementById('contactComment').value = '';
          updateCharCount();
        }
      } catch (err) {
        showResult(resultBox, resultContent, 'error', [['status','✗ FETCH ERROR','err'],['message',err.message,'err']]);
      } finally {
        setLoading(btn, false, '→');
      }
    }
    async function fetchJSON(url, opts) {
      const res = await fetch(url, opts);
      return res.json();
    }
    function setLoading(btn, loading, idleIcon) {
      if (!btn.disabled || !loading) btn.disabled = loading;
      btn.classList.toggle('loading', loading);
      const icon = btn.querySelector('.btn-icon');
      if (icon) icon.textContent = loading ? '↻' : idleIcon;
    }
    function showResult(box, content, type, rows) {
      box.className = 'result-box visible ' + (type === 'error' ? 'error-state' : 'success');
      content.innerHTML = rows.map(function(r) {
        return '<div><span class="key">' + escHtml(r[0]) + '</span><span class="val' + (r[2] ? ' ' + r[2] : '') + '">' + escHtml(String(r[1])) + '</span></div>';
      }).join('');
    }
    function escHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
  </script>
</body>
</html>
